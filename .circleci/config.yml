version: 2
jobs:
  checks:
    docker:
      - image: "cimg/node:lts"
    steps:
      - checkout
      - run:
          name: install
          command: npm ci && npm i --no-package-lock --no-save typeorm@0.3
      - run:
          name: lint
          command: npm run lint
      - run:
          name: test
          command: npm run test:unit

  release:
    docker:
      - image: "cimg/node:lts"
    steps:
      - checkout
      - run:
          name: install
          command: npm ci
      - run:
          name: build
          command: npm run build
      - run:
          name: release
          command: npm run semantic-release || true

  prepare-func-tests-released:
    docker:
      - image: "cimg/node:lts"
    steps:
      - checkout
      - run:
          name: install
          command: npm ci
      - run:
          name: install additional dependencies
          command: npm install typeorm@0.3 @aws-sdk/client-rds-data typeorm-aurora-data-api-driver
      - persist_to_workspace:
          root: .
          paths:
            - .

  run-mysql-func-tests-released:
    machine:
      image: ubuntu-2204:2023.04.2
    steps:
      - attach_workspace:
          at: .
      - run: |
          echo 'export NVM_DIR="/opt/circleci/.nvm"' >> $BASH_ENV
          echo ' [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"' >> $BASH_ENV
      - run:
          name: upgrade node
          command: nvm install --lts
      - run:
          name: start local mysql
          command: docker-compose -f docker/mysql.yml up -d
      - run:
          name: run mysql functional test
          command: |
            nvm use --lts
            unset MYSQL_SECRET_ARN
            unset MYSQL_RESOURCE_ARN
            npm run test:mysql-func

  run-pg-func-tests-released:
    machine:
      image: ubuntu-2204:2023.04.2
    steps:
      - attach_workspace:
          at: .
      - run: |
          echo 'export NVM_DIR="/opt/circleci/.nvm"' >> $BASH_ENV
          echo ' [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"' >> $BASH_ENV
      - run:
          name: upgrade node
          command: nvm install --lts
      - run:
          name: start local pg
          command: docker-compose -f docker/pg.yml up -d
      - run:
          name: run mysql functional test
          command: |
            nvm use --lts
            unset PG_SECRET_ARN
            unset PG_RESOURCE_ARN
            npm run test:pg-func

  prepare-func-tests:
    docker:
      - image: "cimg/node:lts"
    steps:
      - checkout
      - run:
          name: install
          command: npm ci
      - run:
          name: install typeorm
          command: npm i --no-package-lock --no-save typeorm@0.3
      - run:
          name: build
          command: npm run build
      - run:
          name: install @aws-sdk/client-rds-data
          command: npm i @aws-sdk/client-rds-data
      - persist_to_workspace:
          root: .
          paths:
            - .

  run-mysql-func-tests:
    machine:
      image: ubuntu-2204:2023.04.2
    steps:
      - attach_workspace:
          at: .
      - run: |
          echo 'export NVM_DIR="/opt/circleci/.nvm"' >> $BASH_ENV
          echo ' [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"' >> $BASH_ENV
      - run:
          name: upgrade node
          command: nvm install --lts
      - run:
          name: link modules
          command: npm link && cd node_modules/typeorm && npm link && npm link typeorm-aurora-data-api-driver && cd ../../../ && npm link typeorm
      - run:
          name: start local mysql
          command: docker-compose -f docker/mysql.yml up -d
      - run:
          name: run mysql functional test
          command: |
            nvm use --lts
            unset MYSQL_SECRET_ARN
            unset MYSQL_RESOURCE_ARN
            export AWS_ACCESS_KEY_ID="dummy"
            export AWS_SECRET_ACCESS_KEY="dummy"
            export AWS_REGION="eu-west-1"
            npm run test:mysql-func

  run-pg-func-tests:
    machine:
      image: ubuntu-2204:2023.04.2
    steps:
      - attach_workspace:
          at: .
      - run: |
          echo 'export NVM_DIR="/opt/circleci/.nvm"' >> $BASH_ENV
          echo ' [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"' >> $BASH_ENV
      - run:
          name: upgrade node
          command: nvm install --lts
      - run:
          name: link modules
          command: npm link && cd node_modules/typeorm && npm link && npm link typeorm-aurora-data-api-driver && cd ../../../ && npm link typeorm
      - run:
          name: start local postgres
          command: docker-compose -f docker/pg.yml up -d
      - run:
          name: run mysql functional test
          command: |
            nvm use --lts
            unset PG_SECRET_ARN
            unset PG_RESOURCE_ARN
            export AWS_ACCESS_KEY_ID="dummy"
            export AWS_SECRET_ACCESS_KEY="dummy"
            export AWS_REGION="eu-west-1"
            npm run test:pg-func

  run-mysql-func-tests-server:
    docker:
      - image: "cimg/node:lts"
    steps:
      - attach_workspace:
          at: .
      - run:
          name: link modules
          command: npm link && cd node_modules/typeorm && npm link && npm link typeorm-aurora-data-api-driver && cd ../../../ && npm link typeorm
      - run:
          name: run mysql functional test
          command: |
            node test/functional/utils/wake-db-up.js mysql
            [[ -v MYSQL_SECRET_ARN ]] && [[ -v MYSQL_RESOURCE_ARN ]] && npm run test:mysql-func

  run-mysql-func-tests-server-released:
    docker:
      - image: "cimg/node:lts"
    steps:
      - attach_workspace:
          at: .
      - run:
          name: run mysql functional test
          command: |
            node test/functional/utils/wake-db-up.js mysql
            [[ -v MYSQL_SECRET_ARN ]] && [[ -v MYSQL_RESOURCE_ARN ]] && npm run test:mysql-func

  run-pg-func-tests-server:
    docker:
      - image: "cimg/node:lts"
    steps:
      - attach_workspace:
          at: .
      - run:
          name: link modules
          command: npm link && cd node_modules/typeorm && npm link && npm link typeorm-aurora-data-api-driver && cd ../../../ && npm link typeorm
      - run:
          name: run pg functional test
          command: |
            node test/functional/utils/wake-db-up.js postgres
            [[ -v PG_SECRET_ARN ]] && [[ -v PG_RESOURCE_ARN ]] && npm run test:pg-func

  run-pg-func-tests-server-released:
    docker:
      - image: "cimg/node:lts"
    steps:
      - attach_workspace:
          at: .
      - run:
          name: run pg functional test
          command: |
            node test/functional/utils/wake-db-up.js postgres
            [[ -v PG_SECRET_ARN ]] && [[ -v PG_RESOURCE_ARN ]] && npm run test:pg-func

workflows:
  version: 2
  release:
    jobs:
      - checks:
          filters:
            branches:
              only:
                - master
      - prepare-func-tests:
          filters:
            branches:
              only:
                - master
          requires:
            - checks
      - run-mysql-func-tests:
          filters:
            branches:
              only:
                - master
          requires:
            - prepare-func-tests
      - run-pg-func-tests:
          filters:
            branches:
              only:
                - master
          requires:
            - prepare-func-tests
      - run-mysql-func-tests-server:
          filters:
            branches:
              only:
                - master
          requires:
            - prepare-func-tests
      - run-pg-func-tests-server:
          filters:
            branches:
              only:
                - master
          requires:
            - prepare-func-tests
      - release:
          filters:
            branches:
              only:
                - master
          requires:
            - run-pg-func-tests
            - run-mysql-func-tests
            - run-pg-func-tests-server
            - run-mysql-func-tests-server

  nightly-released:
    triggers:
      - schedule:
          cron: "0 0 * * *"
          filters:
            branches:
              only:
                - master
    jobs:
      - checks
      - prepare-func-tests-released:
          requires:
            - checks
      - run-mysql-func-tests-released:
          requires:
            - prepare-func-tests-released
      - run-pg-func-tests-released:
          requires:
            - prepare-func-tests-released
      - run-mysql-func-tests-server-released:
          requires:
            - prepare-func-tests-released
      - run-pg-func-tests-server-released:
          requires:
            - prepare-func-tests-released

  nightly:
    triggers:
      - schedule:
          cron: "0 1 * * *"
          filters:
            branches:
              only:
                - master
    jobs:
      - checks
      - prepare-func-tests:
          requires:
            - checks
      - run-mysql-func-tests:
          requires:
            - prepare-func-tests
      - run-pg-func-tests:
          requires:
            - prepare-func-tests
      - run-mysql-func-tests-server:
          requires:
            - prepare-func-tests
      - run-pg-func-tests-server:
          requires:
            - prepare-func-tests

  check-commit:
    jobs:
      - checks:
          filters:
            branches:
              ignore:
                - master
      - prepare-func-tests:
          requires:
            - checks
      - run-mysql-func-tests:
          requires:
            - prepare-func-tests
      - run-pg-func-tests:
          requires:
            - prepare-func-tests
      - run-mysql-func-tests-server:
          filters:
            branches:
              only:
                - master
          requires:
            - prepare-func-tests
      - run-pg-func-tests-server:
          filters:
            branches:
              only:
                - master
          requires:
            - prepare-func-tests
